name: Build and publish stdio container

on:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - src/**
      - .github/workflows/publish-container.yml
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read and verify distribution version
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_EVENT_NAME}" == "release" && "v${version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build local proof image
        run: docker build --pull --tag actablesite-mcp:test .

      - name: Verify stdio initialize handshake
        shell: bash
        run: |
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"container-check","version":"1"}}}' \
            | docker run --rm -i actablesite-mcp:test \
            | EXPECTED_VERSION="${{ steps.version.outputs.version }}" node -e 'let data=""; process.stdin.on("data", chunk => data += chunk).on("end", () => { const message = JSON.parse(data); if (message.result?.serverInfo?.version !== process.env.EXPECTED_VERSION || message.result?.capabilities?.tools?.listChanged !== false) process.exit(1); });'

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned and latest images
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

      - name: Prove anonymous public pull
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          docker logout ghcr.io
          docker image rm "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.version }}" || true
          docker pull "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.version }}"
